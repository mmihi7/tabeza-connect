<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tabeza Connect - Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      padding: 20px;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    
    .header {
      background: white;
      border-radius: 12px;
      padding: 30px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      text-align: center;
    }
    
    h1 {
      color: #333;
      margin-bottom: 10px;
    }
    
    .subtitle {
      color: #666;
    }
    
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      margin-bottom: 20px;
    }
    
    .card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    
    .card h2 {
      color: #333;
      font-size: 18px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .status-item {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #eee;
    }
    
    .status-item:last-child {
      border-bottom: none;
    }
    
    .status-label {
      color: #666;
      font-weight: 500;
    }
    
    .status-value {
      color: #333;
      font-weight: 600;
    }
    
    .status-value.online {
      color: #10b981;
    }
    
    .status-value.offline {
      color: #ef4444;
    }
    
    .status-value.warning {
      color: #f59e0b;
    }
    
    .btn {
      display: block;
      width: 100%;
      padding: 12px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 12px;
      text-align: center;
      text-decoration: none;
    }
    
    .btn:hover {
      background: #5568d3;
    }
    
    .btn-secondary {
      background: #6b7280;
    }
    
    .btn-secondary:hover {
      background: #4b5563;
    }
    
    .form-group {
      margin-bottom: 16px;
    }
    
    label {
      display: block;
      color: #333;
      font-weight: 600;
      margin-bottom: 6px;
    }
    
    input {
      width: 100%;
      padding: 10px;
      border: 2px solid #e0e0e0;
      border-radius: 6px;
      font-size: 14px;
    }
    
    input:focus {
      outline: none;
      border-color: #667eea;
    }
    
    .alert {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 16px;
      display: none;
    }
    
    .alert.success {
      background: #d1fae5;
      color: #065f46;
    }
    
    .alert.error {
      background: #fee2e2;
      color: #991b1b;
    }
    
    .alert.show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🖨️ Tabeza Connect</h1>
      <p class="subtitle">Receipt Capture Service - Version 1.7.0</p>
    </div>
    
    <div class="alert" id="alert"></div>
    
    <div class="grid">
      <!-- Configuration Card -->
      <div class="card">
        <h2>⚙️ Configuration</h2>
        <div id="configSection">
          <div class="form-group">
            <label for="barId">Bar ID</label>
            <input type="text" id="barId" placeholder="Enter your Bar ID">
          </div>
          <button class="btn" onclick="saveConfig()">Save Configuration</button>
        </div>
        <div class="status-item" style="margin-top: 16px;">
          <span class="status-label">Current Bar ID</span>
          <span class="status-value" id="currentBarId">Not set</span>
        </div>
        <div class="status-item">
          <span class="status-label">Watch Folder</span>
          <span class="status-value" id="watchFolder">C:\TabezaPrints</span>
        </div>
      </div>
      
      <!-- Folder Status Card -->
      <div class="card">
        <h2>📁 Folder Status</h2>
        <div class="status-item">
          <span class="status-label">Main Folder</span>
          <span class="status-value online" id="folderStatus">OK</span>
        </div>
        <div class="status-item">
          <span class="status-label">Capture File</span>
          <span class="status-value online" id="captureFileStatus">OK</span>
        </div>
        <div class="status-item">
          <span class="status-label">Config File</span>
          <span class="status-value online" id="configFileStatus">OK</span>
        </div>
        <button class="btn btn-secondary" onclick="repairFolders()">Repair Folders</button>
        <button class="btn btn-secondary" onclick="openCaptureFolder()">Open Folder</button>
      </div>
      
      <!-- Printer Status Card -->
      <div class="card">
        <h2>🖨️ Printer Setup</h2>
        <div class="status-item">
          <span class="status-label">Printer Status</span>
          <span class="status-value warning" id="printerStatus">Checking...</span>
        </div>
        <button class="btn" onclick="openPrinterSetup()">Configure Printer</button>
      </div>
    </div>
    
    <div class="card">
      <h2>🔗 Quick Actions</h2>
      <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px;">
        <button class="btn btn-secondary" onclick="openCaptureFolder()">Open Capture Folder</button>
        <button class="btn btn-secondary" onclick="openLogs()">View Logs</button>
        <button class="btn btn-secondary" onclick="refreshStatus()">Refresh Status</button>
      </div>
    </div>
  </div>
  
  <script>
    const { ipcRenderer, shell } = require('electron');
    
    let currentConfig = {};
    
    function showAlert(message, type = 'success') {
      const alert = document.getElementById('alert');
      alert.textContent = message;
      alert.className = `alert ${type} show`;
      setTimeout(() => {
        alert.className = 'alert';
      }, 5000);
    }
    
    async function loadConfig() {
      try {
        currentConfig = await ipcRenderer.invoke('get-config');
        document.getElementById('currentBarId').textContent = currentConfig.barId || 'Not set';
        document.getElementById('currentBarId').className = currentConfig.barId ? 'status-value online' : 'status-value warning';
        document.getElementById('barId').value = currentConfig.barId || '';
        document.getElementById('watchFolder').textContent = currentConfig.watchFolder || 'C:\\TabezaPrints';
        
        // Update version
        const version = await ipcRenderer.invoke('get-app-version');
        document.querySelector('.subtitle').textContent = `Receipt Capture Service - Version ${version}`;
      } catch (err) {
        console.error('Failed to load config:', err);
        showAlert('Failed to load configuration: ' + err.message, 'error');
      }
    }
    
    async function saveConfig() {
      const barId = document.getElementById('barId').value.trim();
      
      if (!barId) {
        showAlert('Please enter a Bar ID', 'error');
        return;
      }
      
      try {
        currentConfig.barId = barId;
        
        const result = await ipcRenderer.invoke('save-config', currentConfig);
        
        if (result.success) {
          showAlert('Configuration saved successfully!', 'success');
          await loadConfig();
        } else {
          showAlert('Failed to save configuration: ' + result.error, 'error');
        }
      } catch (err) {
        showAlert('Failed to save configuration: ' + err.message, 'error');
      }
    }
    
    async function checkFolderStatus() {
      try {
        const result = await ipcRenderer.invoke('check-folder-structure');
        document.getElementById('folderStatus').textContent = result.exists ? 'OK' : 'Missing';
        document.getElementById('folderStatus').className = result.exists ? 'status-value online' : 'status-value offline';
        
        document.getElementById('captureFileStatus').textContent = result.hasCaptureFile ? 'OK' : 'Missing';
        document.getElementById('captureFileStatus').className = result.hasCaptureFile ? 'status-value online' : 'status-value offline';
        
        document.getElementById('configFileStatus').textContent = result.hasConfig ? 'OK' : 'Missing';
        document.getElementById('configFileStatus').className = result.hasConfig ? 'status-value online' : 'status-value offline';
      } catch (err) {
        console.error('Failed to check folder status:', err);
      }
    }
    
    async function checkPrinterStatus() {
      try {
        console.log('[Dashboard] Checking printer status...');
        const result = await ipcRenderer.invoke('check-printer-setup');
        console.log('[Dashboard] Printer status result:', result);
        
        const statusText = result.Status || result.status || 'Unknown';
        console.log('[Dashboard] Status text:', statusText);
        
        document.getElementById('printerStatus').textContent = statusText;
        document.getElementById('printerStatus').className = statusText === 'FullyConfigured' ? 'status-value online' : 'status-value warning';
      } catch (err) {
        console.error('[Dashboard] Failed to check printer status:', err);
        document.getElementById('printerStatus').textContent = 'Error';
        document.getElementById('printerStatus').className = 'status-value offline';
      }
    }
    
    async function repairFolders() {
      try {
        await ipcRenderer.invoke('repair-folder-structure');
        showAlert('Folder structure repaired successfully!', 'success');
        await checkFolderStatus();
      } catch (err) {
        showAlert('Failed to repair folders: ' + err.message, 'error');
      }
    }
    
    function openCaptureFolder() {
      shell.openPath('C:\\TabezaPrints');
    }
    
    function openLogs() {
      shell.openPath('C:\\TabezaPrints\\logs');
    }
    
    function openPrinterSetup() {
      ipcRenderer.send('open-printer-setup');
    }
    
    async function refreshStatus() {
      await loadConfig();
      await checkFolderStatus();
      await checkPrinterStatus();
      showAlert('Status refreshed', 'success');
    }
    
    // Listen for broadcast events from main process
    ipcRenderer.on('config-updated', (event, config) => {
      console.log('[Dashboard] Config updated event received:', config);
      loadConfig();
    });
    
    ipcRenderer.on('printer-setup-complete', () => {
      console.log('[Dashboard] Printer setup complete event received');
      // Immediately check printer status
      checkPrinterStatus();
      showAlert('Printer setup completed successfully!', 'success');
    });
    
    // Auto-refresh every 5 seconds
    setInterval(() => {
      checkFolderStatus();
      checkPrinterStatus();
    }, 5000);
    
    // Load initial status
    loadConfig();
    checkFolderStatus();
    checkPrinterStatus();
  </script>
</body>
</html>
