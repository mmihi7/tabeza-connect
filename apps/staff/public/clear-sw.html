<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clear Service Worker - Tabeza Staff</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 600px;
      margin: 50px auto;
      padding: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
    }
    h1 {
      color: #333;
      margin-top: 0;
    }
    button {
      background: #667eea;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      margin: 10px 5px;
    }
    button:hover {
      background: #5568d3;
    }
    .status {
      margin-top: 20px;
      padding: 15px;
      border-radius: 8px;
      display: none;
    }
    .status.success {
      background: #d4edda;
      color: #155724;
      display: block;
    }
    .status.error {
      background: #f8d7da;
      color: #721c24;
      display: block;
    }
    .status.info {
      background: #d1ecf1;
      color: #0c5460;
      display: block;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🔧 Clear Service Worker</h1>
    <p>Use this page to clear service worker registrations and cache if you're experiencing issues.</p>
    
    <div>
      <button onclick="clearServiceWorker()">Clear Service Worker</button>
      <button onclick="clearCache()">Clear Cache</button>
      <button onclick="clearAll()">Clear Everything</button>
    </div>
    
    <div id="status" class="status"></div>
  </div>

  <script>
    function showStatus(message, type = 'info') {
      const status = document.getElementById('status');
      status.textContent = message;
      status.className = `status ${type}`;
    }

    async function clearServiceWorker() {
      try {
        if ('serviceWorker' in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          
          if (registrations.length === 0) {
            showStatus('No service workers found to clear.', 'info');
            return;
          }

          for (let registration of registrations) {
            await registration.unregister();
          }
          
          showStatus(`✅ Cleared ${registrations.length} service worker(s). Refresh the page.`, 'success');
        } else {
          showStatus('Service workers not supported in this browser.', 'error');
        }
      } catch (error) {
        showStatus(`Error: ${error.message}`, 'error');
      }
    }

    async function clearCache() {
      try {
        if ('caches' in window) {
          const cacheNames = await caches.keys();
          
          if (cacheNames.length === 0) {
            showStatus('No caches found to clear.', 'info');
            return;
          }

          await Promise.all(
            cacheNames.map(cacheName => caches.delete(cacheName))
          );
          
          showStatus(`✅ Cleared ${cacheNames.length} cache(s). Refresh the page.`, 'success');
        } else {
          showStatus('Cache API not supported in this browser.', 'error');
        }
      } catch (error) {
        showStatus(`Error: ${error.message}`, 'error');
      }
    }

    async function clearAll() {
      try {
        await clearServiceWorker();
        await clearCache();
        
        // Also clear localStorage and sessionStorage
        localStorage.clear();
        sessionStorage.clear();
        
        showStatus('✅ Cleared everything! Refresh the page or close and reopen the browser.', 'success');
      } catch (error) {
        showStatus(`Error: ${error.message}`, 'error');
      }
    }

    // Auto-check on load
    window.addEventListener('load', async () => {
      if ('serviceWorker' in navigator) {
        const registrations = await navigator.serviceWorker.getRegistrations();
        if (registrations.length > 0) {
          showStatus(`Found ${registrations.length} service worker(s) registered. Click "Clear Service Worker" to remove them.`, 'info');
        }
      }
    });
  </script>
</body>
</html>
